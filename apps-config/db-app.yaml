apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: micro-db
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/larbi-ishak/argoCD-hw.git'
    path: manifests/db
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
