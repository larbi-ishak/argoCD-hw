apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: api
        image: hashicorp/http-echo:latest
        # Injecting K8s Environment Variables
        env:
        - name: DB_CONNECTION_STRING
          value: "redis://redis-svc:6379"
        - name: DEPLOYMENT_ENV
          value: "Huawei-Cloud-Production"
        # The echo app uses arguments to output text, so we pass the env vars into it
        args:
        - "-text=Backend API is running in $(DEPLOYMENT_ENV). Connected to DB at $(DB_CONNECTION_STRING)"
        - "-listen=:8080"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: default
spec:
  selector:
    app: backend
  ports:
  - protocol: TCP
    port: 8080
