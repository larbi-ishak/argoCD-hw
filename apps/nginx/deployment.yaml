apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: default
spec:
  replicas: 4
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: larbizyoisco/my-app:be23ba34f2b3bd72503986145179db2456a0352f
        ports:
        - containerPort: 80
